version: "3.8"

# ============================================================
# 爆款短视频复刻SaaS平台 - 生产环境编排
# ============================================================
# 启动命令: docker-compose up -d
# 停止命令: docker-compose down
# 重启服务: docker-compose restart backend celery-worker
# ============================================================

services:
  # ==================== MySQL 8.0 ====================
  mysql:
    image: mysql:8.0
    container_name: sv_saas_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-Root@2024Secure}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-short_video_saas}
      MYSQL_USER: ${MYSQL_USER:-sv_saas}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-SvSaas@2024Secure}
      TZ: Asia/Shanghai
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backup/mysql:/backup
      - ./backend/init.sql:/docker-entrypoint-initdb.d/01-init.sql
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --default-authentication-plugin=mysql_native_password
      --max-connections=500
      --innodb-buffer-pool-size=1G
      --slow-query-log=ON
      --slow-query-log-file=/var/log/mysql/slow.log
      --long-query-time=2
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-Root@2024Secure}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sv_saas_internal

  # ==================== Redis 7.0 ====================
  redis:
    image: redis:7-alpine
    container_name: sv_saas_redis
    restart: always
    command: redis-server /usr/local/etc/redis/redis.conf
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
      - ./config/redis.conf:/usr/local/etc/redis/redis.conf:ro
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - sv_saas_internal

  # ==================== 后端 FastAPI ====================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sv_saas_backend
    restart: always
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    environment:
      DATABASE_URL: mysql+aiomysql://${MYSQL_USER:-sv_saas}:${MYSQL_PASSWORD:-SvSaas@2024Secure}@mysql:3306/${MYSQL_DATABASE:-short_video_saas}?charset=utf8mb4
      DATABASE_SYNC_URL: mysql+pymysql://${MYSQL_USER:-sv_saas}:${MYSQL_PASSWORD:-SvSaas@2024Secure}@mysql:3306/${MYSQL_DATABASE:-short_video_saas}?charset=utf8mb4
      REDIS_URL: redis://:${REDIS_PASSWORD:-}@redis:6379/0
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD:-}@redis:6379/1
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD:-}@redis:6379/2
      SECRET_KEY: ${SECRET_KEY:-change-me-to-random-32-chars-minimum}
      DEBUG: "false"
      CORS_ORIGINS: '["https://yourdomain.com","https://www.yourdomain.com"]'
      TZ: Asia/Shanghai
    volumes:
      - video_storage:/app/videos
      - temp_storage:/app/temp
      - ./logs/backend:/app/logs
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: "4.0"
          memory: 4G
        reservations:
          cpus: "1.0"
          memory: 1G
    networks:
      - sv_saas_internal
      - sv_saas_proxy

  # ==================== Celery Worker ====================
  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sv_saas_celery_worker
    restart: always
    command: celery -A app.tasks.celery_app worker -l info -c ${CELERY_WORKERS:-4} --pool=prefork
    environment:
      DATABASE_URL: mysql+aiomysql://${MYSQL_USER:-sv_saas}:${MYSQL_PASSWORD:-SvSaas@2024Secure}@mysql:3306/${MYSQL_DATABASE:-short_video_saas]?charset=utf8mb4
      REDIS_URL: redis://:${REDIS_PASSWORD:-}@redis:6379/0
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD:-}@redis:6379/1
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD:-}@redis:6379/2
      SECRET_KEY: ${SECRET_KEY:-change-me-to-random-32-chars-minimum}
      TZ: Asia/Shanghai
    volumes:
      - video_storage:/app/videos
      - temp_storage:/app/temp
      - ./logs/celery:/app/logs
    depends_on:
      - backend
      - redis
    deploy:
      replicas: ${CELERY_REPLICAS:-1}
      resources:
        limits:
          cpus: "8.0"
          memory: 8G
    networks:
      - sv_saas_internal

  # ==================== Celery Beat (定时任务) ====================
  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sv_saas_celery_beat
    restart: always
    command: celery -A app.tasks.celery_app beat -l info --scheduler django_crontab.scheduler:CrontabScheduler
    environment:
      DATABASE_URL: mysql+aiomysql://${MYSQL_USER:-sv_saas}:${MYSQL_PASSWORD:-SvSaas@2024Secure}@mysql:3306/${MYSQL_DATABASE:-short_video_saas}?charset=utf8mb4
      REDIS_URL: redis://:${REDIS_PASSWORD:-}@redis:6379/0
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD:-}@redis:6379/1
      TZ: Asia/Shanghai
    depends_on:
      - redis
    networks:
      - sv_saas_internal

  # ==================== Nginx 反向代理 ====================
  nginx:
    image: nginx:1.25-alpine
    container_name: sv_saas_nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./frontend-user/dist:/usr/share/nginx/html/user:ro
      - ./frontend-admin/dist:/usr/share/nginx/html/admin:ro
      - video_storage:/app/videos:ro
      - ./logs/nginx:/var/log/nginx
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:80/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - sv_saas_proxy

  # ==================== 视频存储（可选：挂载NAS/OSS） ====================
  # 如果使用阿里云OSS/S3，替换为：
  # oss-sync:
  #   image: alpine:latest
  #   command: sh -c "while true; do ossutil sync -r ./videos oss://bucket/videos/; sleep 3600; done"
  #   volumes:
  #     - video_storage:/videos
  #   depends_on:
  #     - backend

volumes:
  mysql_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /data/mysql
  redis_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /data/redis
  video_storage:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /data/videos
  temp_storage:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /data/temp

networks:
  sv_saas_internal:
    driver: bridge
    internal: true  # 内部网络，外部不可访问
  sv_saas_proxy:
    driver: bridge