# ============================================
# 爆款短视频复刻SaaS平台 - Nginx 生产配置
# ============================================

# 上游后端服务
upstream backend_servers {
    server backend:8000;
    # 横向扩容时可添加更多后端节点
    # server backend2:8000;
    # server backend3:8000;
    keepalive 32;
}

# 限流配置
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=upload_limit:10m rate=10r/s;
limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

# HTTP 服务器（重定向到 HTTPS）
server {
    listen 80;
    server_name _;

    # 强制 HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS 服务器
server {
    listen 443 ssl http2;
    server_name your-domain.com;  # 修改为你的域名

    # SSL 证书配置
    ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-RSA-AES128-GCM-SHA256:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_stapling        on;
    ssl_stapling_verify on;

    # 安全头
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # 客户端上传限制
    client_max_body_size 500M;
    client_body_timeout 300s;
    client_header_timeout 60s;
    keepalive_timeout 65s;

    # ==================== API 反向代理 ====================
    location /api/ {
        # 限流
        limit_req zone=api_limit burst=20 nodelay;
        limit_conn conn_limit 20;

        proxy_pass http://backend_servers/api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 超时配置
        proxy_connect_timeout 60s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;

        # 缓冲配置
        proxy_buffering off;
        proxy_request_buffering off;
    }

    # ==================== 文件上传 ====================
    location /api/parse/upload {
        # 放宽上传限流
        limit_req zone=upload_limit burst=5 nodelay;

        proxy_pass http://backend_servers/api/parse/upload;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 大文件上传超时
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
        client_max_body_size 500M;
    }

    # ==================== 用户端前端 ====================
    location / {
        root /usr/share/nginx/html/user;
        try_files $uri $uri/ /index.html;

        # 静态资源缓存
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
            access_log off;
        }
    }

    # ==================== 管理后台前端 ====================
    location /admin/ {
        alias /usr/share/nginx/html/admin/;
        try_files $uri $uri/ /admin/index.html;

        # 静态资源缓存
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
            access_log off;
        }
    }

    # ==================== 视频文件静态托管 ====================
    location /videos/ {
        alias /var/www/videos/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        add_header Access-Control-Allow-Origin *;

        # 支持范围请求（视频拖动）
        sendfile on;
        tcp_nopush on;
        directio 5M;
    }

    # ==================== Swagger 文档（生产环境建议关闭） ====================
    location /docs {
        proxy_pass http://backend_servers;
        # 生产环境可注释掉以下行以禁用
        # return 404;
    }

    # ==================== 健康检查 ====================
    location /health {
        access_log off;
        return 200 '{"status": "ok", "service": "nginx"}';
        add_header Content-Type application/json;
    }

    # ==================== 日志配置 ====================
    access_log /var/log/nginx/access.log combined;
    error_log /var/log/nginx/error.log warn;

    # ==================== Gzip 压缩 ====================
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;
    gzip_min_length 1024;
}