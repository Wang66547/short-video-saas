# ============================================================
# Nginx 生产环境配置
# 反向代理 + HTTPS + 静态资源 + 限流 + 日志轮转
# ============================================================

# 上游服务定义
upstream backend_api {
    least_conn;  # 最少连接调度
    server backend:8000 weight=5 max_fails=3 fail_timeout=30s;
    # 横向扩容时可添加更多后端节点
    # server backend2:8000 weight=3;
    # server backend3:8000 weight=3;
    keepalive 32;
}

upstream celery_flower {
    server celery-worker:5555;
}

# HTTP 服务器 - 强制跳转到 HTTPS
server {
    listen 80;
    server_name _;  # 生产环境改为你的域名

    # 重定向所有 HTTP 到 HTTPS
    location / {
        return 301 https://$host$request_uri;
    }

    # ACME 挑战（Let's Encrypt 证书续期需要）
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # 健康检查端点（不跳转 HTTPS）
    location /nginx-health {
        access_log off;
        return 200 "OK";
        add_header Content-Type text/plain;
    }
}

# HTTPS 服务器
server {
    listen 443 ssl http2;
    server_name yourdomain.com www.yourdomain.com;

    # ==================== SSL 证书 ====================
    ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    ssl_trusted_certificate /etc/nginx/ssl/chain.pem;

    # SSL 优化配置
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # OCSP Stapling
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 8.8.8.8 1.1.1.1 valid=300s;
    resolver_timeout 5s;

    # ==================== 安全头 ====================
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; media-src 'self' blob:; font-src 'self' data:;" always;

    # ==================== 客户端限制 ====================
    client_max_body_size 500M;       # 允许上传 500MB 视频
    client_body_timeout 300s;
    client_header_timeout 60s;
    keepalive_timeout 75s;

    # ==================== 速率限制 ====================
    # 定义限流区域
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=login_limit:10m rate=5r/m;
    limit_req_zone $binary_remote_addr zone=upload_limit:10m rate=3r/m;
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

    # 允许的最大并发连接
    limit_conn conn_limit 100;

    # ==================== 访问日志（带轮转） ====================
    access_log /var/log/nginx/access.log combined buffer=16k flush=5m;
    error_log    /var/log/nginx/error.log warn;

    # ==================== 用户端前端 ====================
    location / {
        root /usr/share/nginx/html/user;
        try_files $uri $uri/ /index.html;

        # 静态资源缓存
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
            access_log off;
        }
    }

    # ==================== 管理后台前端 ====================
    location /admin/ {
        alias /usr/share/nginx/html/admin/;
        try_files $uri $uri/ /admin/index.html;

        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg)$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
            access_log off;
        }
    }

    # ==================== API 反向代理 ====================
    location /api/ {
        # 限流
        limit_req zone=api_limit burst=50 nodelay;

        # 代理到后端
        proxy_pass http://backend_api/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        # 超时设置（视频处理可能较慢）
        proxy_connect_timeout 10s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;

        # 缓冲区
        proxy_buffer_size 16k;
        proxy_buffers 4 64k;
        proxy_busy_buffers_size 128k;

        # 不缓存 API 响应
        proxy_no_cache 1;
        proxy_cache_bypass 1;
    }

    # ==================== 登录接口（严格限流） ====================
    location /api/auth/ {
        limit_req zone=login_limit burst=3 nodelay;
        proxy_pass http://backend_api/api/auth/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ==================== 上传接口（严格限流） ====================
    location /api/parse/upload {
        limit_req zone=upload_limit burst=2 nodelay;
        proxy_pass http://backend_api/api/parse/upload;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 500M;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    # ==================== 视频文件静态托管 ====================
    location /videos/ {
        alias /app/videos/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        add_header Access-Control-Allow-Origin *;

        # 支持范围请求（视频拖动播放）
        sendfile on;
        tcp_nopush on;
        aio threads;

        # 防止越权访问
        internal;  # 只能通过后端代理访问，不直接暴露
    }

    # ==================== Swagger 文档（生产环境可关闭） ====================
    location /docs {
        proxy_pass http://backend_api/docs;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /redoc {
        proxy_pass http://backend_api/redoc;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ==================== Celery Flower 监控（可选，加认证） ====================
    # location /flower/ {
    #     auth_basic "Celery Monitor";
    #     auth_basic_user_file /etc/nginx/.htpasswd;
    #     proxy_pass http://celery_flower/;
    #     proxy_set_header Host $host;
    #     proxy_set_header X-Real-IP $remote_addr;
    # }

    # ==================== 健康检查 ====================
    location /health {
        access_log off;
        proxy_pass http://backend_api/health;
        proxy_set_header Host $host;
    }

    # ==================== 404/502 友好错误页 ====================
    error_page 404 /404.html;
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }

    # ==================== 禁止访问隐藏文件 ====================
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}